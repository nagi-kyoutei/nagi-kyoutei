name: ナギちゃん自動集計

on:
  schedule:
    # 2026-07-14: GitHub公式ドキュメントで「毎時00分ちょうどは高負荷でscheduleが遅延・ドロップされやすい」と判明。
    # 00分・30分ちょうどを避けて設定(それでも実行保証は無いので、外部cron(cron-job.org等)からworkflow_dispatchを叩く方式を別途本命として併用する。これはあくまで保険)。
    - cron: '7 3 * * *'    # UTC 03:07 = 日本時間12:07(正午の保険)
    - cron: '7 8 * * *'    # UTC 08:07 = 日本時間17:07(夕方の保険)
    - cron: '37 13 * * *'  # UTC 13:37 = 日本時間22:37(夜の保険)
  workflow_dispatch: {}     # Actionsタブから手動実行、または外部cronサービスからのAPI呼び出しもここで受け付ける

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 海水場データを集計する
        run: node scripts/collect.js
      - name: 結果をリポジトリに保存する
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🦀 自動集計データ更新"
          file_pattern: data/*.json
