name: ナギちゃん自動集計

on:
  schedule:
    # 2026-07-14: 田中の発案で1日3回に。昼・夕方に動作確認でき、夜だけに頼らない保険にもなる(同じ日のファイルを上書きするだけなので何回動いても安全)。
    - cron: '30 6 * * *'   # UTC 06:30 = 日本時間15:30(★動作確認テスト用。確認できたら削除する)
    - cron: '0 3 * * *'    # UTC 03:00 = 日本時間12:00(正午)
    - cron: '0 8 * * *'    # UTC 08:00 = 日本時間17:00
    - cron: '30 13 * * *'  # UTC 13:30 = 日本時間22:30(2026-07-12: 23:00発火だとcronが最大30分超遅延し日付マタギの危険が出たため前倒し)
  workflow_dispatch: {}     # Actionsタブから手動実行もできるようにする

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 海水場データを集計する
        run: node scripts/collect.js
      - name: 結果をリポジトリに保存する
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🦀 自動集計データ更新"
          file_pattern: data/*.json
